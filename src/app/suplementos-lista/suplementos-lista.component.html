<section class="shop-page">
  <div class="shop-toolbar">
    <div class="toolbar-line"></div>

    <div class="toolbar-content">
      <button class="toolbar-select" type="button">
        <span>Categoría</span>
        <span class="arrow">⌄</span>
      </button>

      <button class="toolbar-select" type="button">
        <span>Ordenar por</span>
        <span class="arrow">⌄</span>
      </button>
    </div>
  </div>

  <section class="products-section">
    <div class="products-grid">
      <article class="product-card" *ngFor="let suplemento of suplementos">
        <div class="badge-offer" *ngIf="suplemento.clearance">
          30% OFF
        </div>

        <div class="product-image-box">
          <img
            [src]="suplemento.image"
            [alt]="suplemento.name"
            [routerLink]="['/suplementos', suplemento.id]"
          />
        </div>

        <div class="product-body">
          <h3
            class="product-title"
            [routerLink]="['/suplementos', suplemento.id]"
          >
            {{ suplemento.name }}
          </h3>

          <p class="product-subtitle">
            {{ suplemento.type }} · {{ suplemento.cant }}
          </p>

          <div class="price-block">
            <span class="old-price" *ngIf="suplemento.clearance">
              {{ suplemento.price * 1.25 | currency:'ARS':'symbol':'1.0-0' }}
            </span>

            <span class="current-price">
              {{ suplemento.price | currency:'ARS':'symbol':'1.0-0' }}
            </span>
          </div>

          <p class="installments">
            o 3 cuotas de
            {{ suplemento.price / 3 | currency:'ARS':'symbol':'1.2-2' }}
          </p>

          <div class="stock-status">
            <span *ngIf="suplemento.stock > 0" class="in-stock">
              Disponible
            </span>
            <span *ngIf="suplemento.stock === 0" class="out-stock">
              Sin stock
            </span>
          </div>

          <div class="card-actions">
            <div class="quantity-shell" *ngIf="suplemento.stock > 0">
              <app-input-integer
                [(quantity)]="suplemento.quantity"
                [max]="suplemento.stock">
              </app-input-integer>
            </div>

            <button
              class="buy-button"
              (click)="addToCart(suplemento)"
              [disabled]="suplemento.stock === 0 || suplemento.quantity === 0"
              type="button"
            >
              Comprar
            </button>
          </div>
        </div>
      </article>
    </div>
  </section>
</section>
